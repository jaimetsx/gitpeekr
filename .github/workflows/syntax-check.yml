name: Syntax Check

on:
  push:
    branches:
      - main
      - dev
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.css'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.css'

jobs:
  syntax-check:
    name: Check TS, TSX and CSS Syntax
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript syntax (TS and TSX)
        run: pnpm exec tsc --noEmit

      - name: Install Stylelint
        run: pnpm add -D stylelint

      - name: Check CSS syntax
        run: pnpm exec stylelint "**/*.css" --allow-empty-input
